<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pokemon Model Viewer</title>
    <link rel="stylesheet" href="./src/styles.css?v=5">
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <aside class="sidebar">
      <header class="brand">
        <span class="mark"></span>
        <div>
          <h1>Pokemon Model Viewer</h1>
          <p id="modelRoot">Loading model catalog...</p>
        </div>
      </header>

      <label class="search">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="pikachu, fbx, dae">
      </label>

      <div class="dropzone" id="dropzone">
        <strong>Drop a model file</strong>
        <span>or choose `.glb`, `.gltf`, `.fbx`, `.obj`, `.dae`, `.stl`, `.ply`, `.3ds`</span>
        <input id="fileInput" type="file" accept=".glb,.gltf,.fbx,.obj,.dae,.stl,.ply,.3ds">
      </div>

      <section class="model-list" aria-label="Models">
        <div class="list-head">
          <span id="modelCount">0 models</span>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
        <div id="modelList" class="model-scroll"></div>
      </section>
    </aside>

    <main class="viewer">
      <div class="toolbar">
        <button id="resetButton" type="button">Reset view</button>
        <label><input id="autoRotateInput" type="checkbox"> Auto rotate</label>
        <label>
          Axis
          <select id="spinAxisInput">
            <option value="z">Z</option>
            <option value="y" selected>Y</option>
            <option value="x">X</option>
          </select>
        </label>
        <label><input id="wireframeInput" type="checkbox"> Wireframe</label>
        <label>
          Light
          <input id="lightInput" type="range" min="0.4" max="3" step="0.1" value="1.3">
        </label>
        <button id="gestureButton" type="button" aria-pressed="false">Gesture</button>
      </div>
      <canvas id="scene"></canvas>
      <div class="gesture-panel is-hidden" id="gesturePanel">
        <video id="gestureVideo" autoplay muted playsinline></video>
        <canvas id="gestureCanvas"></canvas>
        <div class="gesture-label" id="gestureStatus">Gesture control off</div>
      </div>
      <div class="status" id="status">Choose a model to begin.</div>
    </main>

    <script type="module" src="./src/main.js?v=25"></script>
  </body>
</html>
